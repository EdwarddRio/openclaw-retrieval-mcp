version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE

  embedding-service:
    build: ./embedding-service
    ports:
      - "8902:8902"
    environment:
      - EMBEDDING_MODEL=BAAI/bge-small-zh-v1.5
      - EMBEDDING_PORT=8902
    volumes:
      - model_cache:/root/.cache

  context-engine:
    build: .
    ports:
      - "8901:8901"
    environment:
      - CHROMA_URL=http://chromadb:8000
      - EMBEDDING_URL=http://embedding-service:8902
      - PROJECT_ROOT=/workspace
      - CONTEXT_ENGINE_RUNTIME_DIR=/app/runtime
    volumes:
      - .:/workspace
      - runtime_data:/app/runtime
    depends_on:
      - chromadb
      - embedding-service

volumes:
  chroma_data:
  model_cache:
  runtime_data:
